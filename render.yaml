services:
  - type: web
    name: data-cleaner-pro
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app.api:app"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PAYMENT_PROVIDER
        sync: false
      - key: WALLET_ADDRESS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "100"
      - key: LANG_DEFAULT
        value: "fa"
      - key: REDIS_URL
        sync: false